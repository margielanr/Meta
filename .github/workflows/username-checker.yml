name: Username Checker

on:
  schedule:
    - cron: "* * * * *"   # every minute
  workflow_dispatch:        # allow manual trigger too

permissions:
  contents: write           # needed to commit results back

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # ── 1. Checkout repo ─────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      # ── 3. Run the checker ───────────────────────────────────────────────
      - name: Run username checker
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python checker.py

      # ── 4. Commit results back to the repo ──────────────────────────────
      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add available.txt taken.txt
          git diff --cached --quiet || git commit -m "chore: update results [$(date -u '+%Y-%m-%d %H:%M:%S UTC')]"
          git push
